events {}

http {
  # Rate limit zone (public endpoints)
  limit_req_zone $binary_remote_addr zone=public_rl:10m rate=10r/s;

  # Internal shared secret (ideally: env/secret manager)
  map $host $internal_auth {
    default "super-long-random-secret-123";
  }

  # Prefer client-provided request id, fallback to nginx generated
  map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
  }

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rid=$req_id upstream=$upstream_addr ustatus=$upstream_status urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  upstream auth_service {
    server host.docker.internal:3001;
    keepalive 16;
  }

  upstream bookings_service {
    server host.docker.internal:3010;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    add_header X-Request-ID $req_id always;

    # ============================================================
    # CORS (WORKING FOR BROWSER)
    # ============================================================

    # Preflight para TODO /api/ (se ejecuta antes de auth/proxy)
    location ^~ /api/ {
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,X-Request-ID" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }

      # Headers para requests normales (GET/POST/etc)
      add_header Access-Control-Allow-Origin $http_origin always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,X-Request-ID" always;
      add_header Access-Control-Expose-Headers "X-Request-ID" always;

      # deja que Nginx siga resolviendo al location más específico
      try_files "" @api_passthrough;
    }

    # Este named location NO procesa el request real, solo evita error de try_files
    location @api_passthrough {
      return 418;
    }

    # ------------------------------------------------------------
    # Routing real (se mantiene como lo tenías)
    # ------------------------------------------------------------

    # -------------------------
    # Internal auth subrequest
    # -------------------------
    location = /_auth {
      internal;

      proxy_pass http://auth_service/api/v1/validate-access-token;

      proxy_http_version 1.1;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;

      proxy_set_header X-Internal-Auth $internal_auth;
      proxy_set_header Authorization $http_authorization;

      proxy_set_header X-Original-URI $request_uri;
      proxy_set_header X-Original-Method $request_method;

      proxy_set_header X-Request-ID $req_id;
    }

    # -------------------------
    # Auth API passthrough
    # -------------------------
    location /api/auth/ {
      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;

      proxy_set_header X-Request-ID $req_id;
      proxy_set_header X-Internal-Auth $internal_auth;
      proxy_set_header X-Gateway 1;

      proxy_pass http://auth_service/api/v1/;
    }

    location /api/auth/login {
      auth_request off;
      limit_req zone=public_rl burst=40 nodelay;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;

      proxy_set_header X-Request-ID $req_id;
      proxy_set_header X-Internal-Auth $internal_auth;
      proxy_set_header X-Gateway 1;

      proxy_pass http://auth_service/api/v1/login;
    }

    location /api/auth/logout {
      auth_request off;
      limit_req zone=public_rl burst=40 nodelay;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;

      proxy_set_header X-Request-ID $req_id;
      proxy_set_header X-Internal-Auth $internal_auth;
      proxy_set_header X-Gateway 1;

      proxy_pass http://auth_service/api/v1/logout;
    }

    # ============================================================
    # PUBLIC
    # ============================================================

    location /api/bookings/rooms {
      auth_request off;
      limit_req zone=public_rl burst=40 nodelay;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;

      proxy_set_header X-Request-ID $req_id;
      proxy_set_header X-Internal-Auth $internal_auth;
      proxy_set_header X-Gateway 1;

      proxy_pass http://bookings_service/api/v1/rooms;
    }

    location /api/bookings/departments {
      auth_request off;
      limit_req zone=public_rl burst=40 nodelay;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;

      proxy_set_header X-Request-ID $req_id;
      proxy_set_header X-Internal-Auth $internal_auth;
      proxy_set_header X-Gateway 1;

      proxy_pass http://bookings_service/api/v1/departments;
    }

    location /api/bookings/bookings/search {
      auth_request off;
      limit_req zone=public_rl burst=40 nodelay;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;

      proxy_set_header X-Request-ID $req_id;
      proxy_set_header X-Internal-Auth $internal_auth;
      proxy_set_header X-Gateway 1;

      proxy_pass http://bookings_service/api/v1/bookings/search;
    }

    location /api/bookings/bookings/reference {
      auth_request off;
      limit_req zone=public_rl burst=30 nodelay;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;

      proxy_set_header X-Request-ID $req_id;
      proxy_set_header X-Internal-Auth $internal_auth;
      proxy_set_header X-Gateway 1;

      proxy_pass http://bookings_service/api/v1/bookings/reference;
    }

    # ✅ PUBLIC: create booking (solo POST)
    # Canonical: POST /api/bookings/bookings
    # Si llega con slash al final, lo normalizamos con 308
    location = /api/bookings/bookings/ {
      return 308 /api/bookings/bookings;
    }

    location = /api/bookings/bookings {
      auth_request off;

      limit_except POST OPTIONS { deny all; }

      limit_req zone=public_rl burst=20 nodelay;
      client_max_body_size 1m;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;

      proxy_set_header X-Request-ID $req_id;
      proxy_set_header X-Internal-Auth $internal_auth;
      proxy_set_header X-Gateway 1;

      # 🔥 backend espera SIN slash final
      proxy_pass http://bookings_service/api/v1/bookings;
    }

    # ============================================================
    # PRIVATE (fallback)
    # ============================================================
    location /api/bookings/ {
      auth_request /_auth;

      auth_request_set $empleado_id $upstream_http_x_empleado_id;
      auth_request_set $correo      $upstream_http_x_correo;
      auth_request_set $roles       $upstream_http_x_roles;

      proxy_set_header X-Empleado-Id $empleado_id;
      proxy_set_header X-Correo      $correo;
      proxy_set_header X-Roles       $roles;

      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;

      proxy_set_header X-Request-ID $req_id;
      proxy_set_header X-Internal-Auth $internal_auth;
      proxy_set_header X-Gateway 1;

      proxy_pass http://bookings_service/api/v1/;
    }
  }
}